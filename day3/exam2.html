<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h3>
        입력 마크업
    </h3>
    <form><!--여러개의 입력 마크업을 그룹화, 추후 백엔드와 통신-->
        텍스트: < input type="text" /> <br/>
        비밀번호: <input type = "password"/> <br/>
        첨부파일: <input type = "file"/> <br/>
        숫자: <input type = "number"/> <br/>
        날짜: <input type="date"/> <br/>
        시간: <input type="time"/> <br/>
        날짜/시간 : <input type="datetime-local"/> <br/>
        스크롤 : <input type="rage"/> <br/>
        체크박스(단일): <input type="radio" name="동의여부"/> 예
                       <input type="radio" name="동의여부"/> 아니오 <br/>

        체크박스(복수): <input type = "checkbox" name="가입경로"/> 뉴스
                       <input type="checkbox" name="가입경로"/> SNS <br/>

        전송버튼: <input type="submit" value="전송버튼" />
        리셋버튼: <input type="reset" value="리셋버튼" />
        일반버튼1: <input type="button" value="일반버튼1" />
        일반버튼2: <button type="button">일반버튼2</button> <br/>

        긴텍스트(게시판?): <textarea cols="50" rows="30"></textarea>//col:열 row:행
        목록상자: <select

    </form>
</body>
</html>
